# Jekyll config for the LogDx-CI GitHub Pages site.
#
# Enable in repo settings: Settings → Pages → Source = "Deploy from
# a branch" → Branch = main, Folder = /docs.

title: "LogDx-CI"
description: "A reproducible benchmark for failure-context strategies in CI log diagnosis."
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-relative-links
  - jekyll-seo-tag

# Make Jekyll auto-render every .md as a cayman-themed page (default
# theme already does this, but make it explicit).
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Treat relative .md links in markdown as page links (so README-style
# cross-links work in the rendered site).
relative_links:
  enabled: true
  collections: true

# Exclude internal scratch / non-public files from the build.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - "*.tmp"

# Sub-directories that are part of the technical docs but not the
# landing-page nav. They render fine; they just don't appear in the
# top-level nav (cayman theme has no auto-nav anyway).
url: "https://eyuansu62.github.io"
baseurl: "/LogDx"
repository: "eyuansu62/LogDx"

# SEO tag plugin uses these.
author: "Bowen Qin"
twitter:
  card: summary_large_image
social:
  links:
    - https://github.com/eyuansu62/LogDx
    - https://huggingface.co/datasets/eyuansu71/logdx-ci
