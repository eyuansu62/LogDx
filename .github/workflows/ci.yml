name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install optional deps
        run: |
          python -m pip install --upgrade pip
          # jsonschema is optional but the schema-validation test
          # uses a structural fallback when it's missing; install
          # it so the full validation path runs in CI.
          pip install jsonschema

      - name: Rebuild diagnosis cache from manifests
        run: |
          # The .cache/diagnosis/ tree is gitignored. Fresh clones
          # (including CI runners) start without it, so the smoke
          # test `test_runner_accepts_command_provider_under_command
          # _config` would otherwise fail with 0 cache hits. The
          # migration tool rebuilds the cache from the tracked
          # canonical manifests deterministically — no API calls.
          python3 tools/migrate_cache_keys_codex_2026_06_08.py

      - name: Run release-gate checks
        run: |
          python3 tools/validate_committed_diagnosis_provider_errors.py
          python3 tools/validate_eval_manifest_consistency.py
          python3 tools/validate_diagnosis_vs_context_consistency.py
          # Catches a cases/ tree change that hasn't been mirrored to
          # https://huggingface.co/datasets/eyuansu71/logdx-ci via
          # huggingface/upload.sh. See tools/validate_corpus_fingerprint.py
          # docstring for the fix workflow (two-step: upload to HF, then
          # refresh huggingface/corpus_fingerprint.json).
          python3 tools/validate_corpus_fingerprint.py
          # Catches a stale "Current release vX.Y" banner in docs that
          # didn't get bumped on the latest tag. Between v1.1 and v1.2
          # the homepage banner went 3 releases stale because no gate
          # validated it. See tools/validate_release_string.py docstring.
          # Fetch tags first so the validator sees the full tag list
          # (actions/checkout@v4 only pulls the HEAD commit by default).
          git fetch --tags --depth=1
          python3 tools/validate_release_string.py

      - name: Run test suites
        run: |
          python3 tools/tests/test_diagnosis_cache_key.py
          python3 tools/tests/test_hybrid_router.py

      - name: Validate canonical protocol lock
        run: |
          # The v2-partial release lock pins 10 schemas + 3 prompts +
          # 4 evaluators + 10 baselines + 35 case SHAs against this
          # commit. Any drift in those tracked files fails the gate.
          python3 tools/validate_protocol_lock.py \
            --protocol protocols/logdx-ci-v2-partial-2026-06-22.lock.json
